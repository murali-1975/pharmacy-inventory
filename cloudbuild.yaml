# ==============================================================================
# Pharmacy Inventory System - Cloud Build CI/CD Pipeline
# ==============================================================================

steps:
  # 1. Run Backend Unit Tests
  - name: 'python:3.11'
    id: 'test-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install --no-cache-dir -r backend/requirements.txt
        export PYTHONPATH=$$PYTHONPATH:$$(pwd)/backend
        export SECRET_KEY="build-validation-key"
        export DATABASE_URL="sqlite:///:memory:"
        export FEATURE_FLAGS="FINANCE_MANAGEMENT"
        python -m pytest backend/tests -v

  # 2. Build Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args: [
      'build', 
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/backend:$_COMMIT_SHA',
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/backend:latest',
      './backend'
    ]
    waitFor: ['test-backend']

  # 3. Build Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args: [
      'build', 
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/frontend:$_COMMIT_SHA',
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/frontend:latest',
      './frontend'
    ]
    waitFor: ['test-backend']

  # 4. Push Backend Images
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/backend', '--all-tags']
    waitFor: ['build-backend']

  # 5. Push Frontend Images
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/frontend', '--all-tags']
    waitFor: ['build-frontend']

  # 6. Run Database Migrations
  # We use the native secretEnv to inject the DATABASE_URL securely.
  - name: '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/backend:$_COMMIT_SHA'
    id: 'run-migrations'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "🚀 Running Alembic Migrations..."
        alembic upgrade head
    secretEnv: ['DATABASE_URL']
    waitFor: ['push-backend']

  # 7. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "staging" ]; then
          TARGET_SERVICE="pharmacy-backend-staging"
        else
          TARGET_SERVICE="pharmacy-backend"
        fi
        
        gcloud run deploy $$TARGET_SERVICE \
          --image '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/backend:$_COMMIT_SHA' \
          --region '$_REGION' \
          --set-secrets 'DATABASE_URL=PHARMACY_DB_URL:latest,SECRET_KEY=PHARMACY_SECRET_KEY:latest' \
          --add-cloudsql-instances '$PROJECT_ID:$_REGION:$_DB_INSTANCE' \
          --allow-unauthenticated \
          --port 8000
    waitFor: ['run-migrations']

  # 8. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "staging" ]; then
          TARGET_B_SERVICE="pharmacy-backend-staging"
          TARGET_F_SERVICE="pharmacy-frontend-staging"
        else
          TARGET_B_SERVICE="pharmacy-backend"
          TARGET_F_SERVICE="pharmacy-frontend"
        fi

        B_URL=$$(gcloud run services describe $$TARGET_B_SERVICE --region $_REGION --format='value(status.url)')
        gcloud run deploy $$TARGET_F_SERVICE \
          --image "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/frontend:$_COMMIT_SHA" \
          --region "$_REGION" \
          --update-env-vars "BACKEND_URL=$$B_URL" \
          --allow-unauthenticated \
          --port 80
    waitFor: ['push-frontend', 'deploy-backend']

# Securely inject the database URL from Secret Manager
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/PHARMACY_DB_URL/versions/latest
      env: 'DATABASE_URL'

# Images to be tracked
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/backend:$_COMMIT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/frontend:$_COMMIT_SHA'

substitutions:
  _REGION: 'asia-south1'
  _REPO_NAME: 'pharmacy-app'
  _DB_INSTANCE: 'pharmacy-db-mumbai'
  _COMMIT_SHA: 'latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
